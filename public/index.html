<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>live chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>
  <div class="header">
    <h1>✨ live chat</h1>
  </div>

  <div class="buttons" id="commands">
    <button class="button" onclick="sendMessage(this.innerText)">哈哈</button>
    <button class="button" onclick="sendMessage(this.innerText)">哈哈哈哈哈</button>
    <button class="button" onclick="sendMessage(this.innerText)">wow</button>
    <button class="button" onclick="sendMessage(this.innerText)">+1</button>
    <button class="button" onclick="sendMessage(this.innerText)">❤️❤️❤️</button>
    <button class="button" onclick="sendMessage(this.innerText)">💙💙💙</button>
  </div>

  <form id="messagebox" autocomplete="off">
    <input type="text" id="message" name="message" maxlength="120" placeholder="say something..." />
    <button type="submit">submit</button>
  </form>

  <script>
    const socket = io();
    const form = document.getElementById('messagebox');
    const input = document.getElementById('message');

    function sendMessage(text) {
      const value = (text || '').trim();
      if (!value) return;
      socket.emit('greeting', value);
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      sendMessage(input.value);
      input.value = '';
    });
  </script>
</body>

</html>
